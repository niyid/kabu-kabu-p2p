# wallet.properties — Kabu-Kabu XMR wallet configuration
# Lifted from Verzus app/src/main/assets/wallet.properties
#
# SECURITY: wallet.password is intentionally blank here.
# The real password is generated per-user at runtime and stored in
# EncryptedSharedPreferences keyed to the device's SHA-256 user-ID.
# Never commit a real password to this file.
#
# network.type: 0 = mainnet, 2 = stagenet
# For production builds set to 0 and update daemon.* accordingly.

network.type=2
daemon.address=stagenet.xmr-tw.org
daemon.port=38081
daemon.ssl=false
wallet.name=kabukabu_wallet_stagenet
wallet.password=
wallet.language=English
daemon.username=
daemon.password=
